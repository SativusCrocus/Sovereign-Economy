# .github/workflows/publish-images.yml
# Pushes Docker images to GHCR on a git tag (v*.*.*). The Akash SDL
# references ghcr.io/<owner>/<name>:<tag> so a tag push is what makes a
# new version deployable. Uses GITHUB_TOKEN — no extra secrets needed.
name: publish-images

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1.0.1 or latest)"
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: agent-swarm-runtime, context: services/agent-swarm-runtime, dockerfile: Dockerfile }
          - { name: goose-executor,      context: services/goose-executor,       dockerfile: Dockerfile }
          - { name: mcp-gateway,         context: services/mcp-gateway,          dockerfile: Dockerfile }
          - { name: rag-ingester,        context: services/graph-rag-indexer,    dockerfile: Dockerfile }
          - { name: frontend,            context: .,                              dockerfile: frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/daes-${{ matrix.service.name }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/daes-${{ matrix.service.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
