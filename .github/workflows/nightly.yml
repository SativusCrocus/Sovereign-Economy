# .github/workflows/nightly.yml
# Long-running gates that don't fit in PR CI: a multi-hour Echidna fuzz
# campaign and a markdown link-checker across the docs tree.
#
# Cron runs at 04:00 UTC daily (off-peak for hosted runners). Manual
# dispatch is supported with overridable test budgets.
#
# Notes on runner limits:
#   GitHub-hosted runners cap each job at 6h. Echidna's "24h" target in
#   the audit checklist is realistic on a self-hosted runner with the
#   ECHIDNA_TIMEOUT input bumped to 86400; on free-tier we cap at 5h50m
#   so the job exits cleanly before the platform kills it.
name: nightly

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      echidna_timeout_s:
        description: "Echidna campaign duration in seconds (free-tier max ~21000)"
        required: false
        default: "21000"
      echidna_test_limit:
        description: "Echidna testLimit (calls per property)"
        required: false
        default: "5000000"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Echidna multi-hour campaign on the bridge invariants.
  # The PR CI job runs a 200k smoke; this is the long form that's actually
  # capable of finding deep counterexamples.
  # ---------------------------------------------------------------------------
  echidna-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h hosted-runner ceiling
    defaults: { run: { working-directory: contracts } }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Fetch forge-std
        run: |
          mkdir -p lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Foundry build (echidna re-uses forge-out/)
        run: forge build

      - name: Install Echidna
        run: |
          curl -L -o /tmp/echidna.tar.gz \
            https://github.com/crytic/echidna/releases/download/v2.2.5/echidna-2.2.5-x86_64-linux.tar.gz
          tar -xzf /tmp/echidna.tar.gz -C /tmp
          sudo mv /tmp/echidna /usr/local/bin/echidna
          echidna --version

      - name: Restore cached corpus (warm-start the fuzzer)
        uses: actions/cache@v4
        with:
          path: contracts/echidna-corpus
          # Bumping the key version invalidates the corpus when we
          # intentionally want a fresh start (e.g. after invariant changes).
          key: echidna-corpus-v1-${{ github.sha }}
          restore-keys: |
            echidna-corpus-v1-

      - name: Run Echidna campaign
        env:
          TIMEOUT_S: ${{ github.event.inputs.echidna_timeout_s || '21000' }}
          TEST_LIMIT: ${{ github.event.inputs.echidna_test_limit || '5000000' }}
        run: |
          # `timeout` is wall-clock; echidna also self-terminates via
          # --test-limit. Whichever fires first wins. We hard-cap with a
          # +60s `timeout` so a runaway echidna can't burn the full 6h.
          timeout $((TIMEOUT_S + 60)) \
            echidna test-echidna/EchidnaBridge.sol \
              --contract EchidnaBridge \
              --config echidna.yaml \
              --test-limit "$TEST_LIMIT" \
              --timeout "$TIMEOUT_S" \
              --format text \
            | tee echidna-nightly.log
          # Echidna exits 0 even if it didn't find a counterexample; we
          # post-process the log to fail on "failed!" / "FAILED" lines.
          if grep -E 'failed!|FAILED|fuzzing[[:space:]]+failed' echidna-nightly.log; then
            echo "::error::Echidna found a counterexample — see job log + uploaded artifact"
            exit 1
          fi

      - name: Upload echidna log + corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-nightly-${{ github.run_id }}
          path: |
            contracts/echidna-nightly.log
            contracts/echidna-corpus/
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Markdown link check — catches doc rot (broken external URLs, dead
  # in-repo references after a rename). Uses the npm tool directly so we
  # control the file scope precisely; the config in
  # .github/markdown-link-check.json controls ignore-list and timeouts.
  # ---------------------------------------------------------------------------
  markdown-link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check@3.12.2

      - name: Check links
        run: |
          # Scope: docs/, top-level README.md, audit/runbook markdown.
          # Excludes node_modules, vendored libs, and frontend/docs/
          # (byte-identical mirror of docs/ — checking once is enough).
          mapfile -t FILES < <(
            find . -type f -name '*.md' \
              -not -path './node_modules/*' \
              -not -path './*/node_modules/*' \
              -not -path './contracts/lib/*' \
              -not -path './contracts/forge-out/*' \
              -not -path './contracts/cache/*' \
              -not -path './contracts/echidna-corpus/*' \
              -not -path './frontend/docs/*' \
              -not -path './frontend/.next/*' \
              -not -path './frontend/node_modules/*' \
              | sort
          )
          echo "checking ${#FILES[@]} markdown file(s)"
          rc=0
          for f in "${FILES[@]}"; do
            echo "::group::$f"
            if ! markdown-link-check --quiet \
                 --config .github/markdown-link-check.json "$f"; then
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc
