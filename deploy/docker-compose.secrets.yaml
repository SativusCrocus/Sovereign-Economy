# deploy/docker-compose.secrets.yaml
# Production-secrets overlay. Demonstrates the Docker Compose `secrets:`
# pattern for the three categories called out in the M1 hardening task:
# HMAC (`MCP_JWT_SECRET`), API key (`WEAVIATE_API_KEY`), and agent signing
# key (`AGENT_KEY_DEFAULT` — as a placeholder; the real signing path should
# move to an HSM per docs/secrets-hardening.md).
#
# The secret material is loaded from files on the host. Populate these from
# the secrets manager of your choice (Vault, Doppler, 1Password CLI, etc.)
# into a tmpfs or ephemeral mount at launch. NEVER commit the plaintext
# files to git — `deploy/secrets/` is gitignored.
#
# Usage:
#   mkdir -p deploy/secrets
#   # Populate from your secrets manager:
#   vault kv get -field=jwt_secret  secret/daes > deploy/secrets/mcp_jwt_secret
#   vault kv get -field=weaviate    secret/daes > deploy/secrets/weaviate_api_key
#   vault kv get -field=agent_key   secret/daes > deploy/secrets/agent_key_default
#   chmod 400 deploy/secrets/*
#
#   docker compose -f deploy/docker-compose.yaml \
#                  -f deploy/docker-compose.prod.yaml \
#                  -f deploy/docker-compose.secrets.yaml up -d
#
# Consumer code change required: each service must prefer `$FOO_FILE` over
# `$FOO` when both are set. This overlay is inert without those changes.
name: daes

secrets:
  mcp_jwt_secret:
    file: ./secrets/mcp_jwt_secret
  weaviate_api_key:
    file: ./secrets/weaviate_api_key
  agent_key_default:
    file: ./secrets/agent_key_default

services:
  mcp-gateway:
    environment:
      # Unset the raw-env variants so consumers fall back to the _FILE path.
      JWT_SECRET: ""
      JWT_SECRET_FILE: /run/secrets/mcp_jwt_secret
    secrets:
      - mcp_jwt_secret

  graph-rag-indexer:
    environment:
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ""
      AUTHENTICATION_APIKEY_ALLOWED_KEYS_FILE: /run/secrets/weaviate_api_key
    secrets:
      - weaviate_api_key

  rag-ingester:
    environment:
      WEAVIATE_API_KEY: ""
      WEAVIATE_API_KEY_FILE: /run/secrets/weaviate_api_key
    secrets:
      - weaviate_api_key

  agent-swarm-runtime:
    environment:
      WEAVIATE_API_KEY: ""
      WEAVIATE_API_KEY_FILE: /run/secrets/weaviate_api_key
    secrets:
      - weaviate_api_key

  # The mcp-gateway signs UserOps using AGENT_KEY_*. In production this MUST
  # move to an HSM (AWS KMS, YubiHSM, Ledger) — see docs/secrets-hardening.md.
  # This file mount is a transitional reference only.
  goose-executor:
    environment:
      AGENT_KEY_DEFAULT: ""
      AGENT_KEY_DEFAULT_FILE: /run/secrets/agent_key_default
    secrets:
      - agent_key_default
