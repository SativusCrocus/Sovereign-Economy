# config/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: agent-swarm-runtime
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-swarm-runtime:9100"]
  - job_name: goose-executor
    metrics_path: /metrics
    static_configs:
      - targets: ["goose-executor:9200"]
  - job_name: mcp-gateway
    metrics_path: /metrics
    scheme: https
    tls_config: { insecure_skip_verify: true }
    static_configs:
      - targets: ["mcp-gateway:8443"]
  - job_name: weaviate
    metrics_path: /v1/metrics
    static_configs:
      - targets: ["graph-rag-indexer:8080"]
